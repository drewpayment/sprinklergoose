# rainbird-api: the ONLY client of the LNK WiFi module.
# The module is single-client, so this must run exactly 1 replica, and the
# Recreate strategy guarantees the old pod is gone before a new one starts.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rainbird-api-data
  namespace: rainbird
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rainbird-api
  namespace: rainbird
  labels:
    app: rainbird-api
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: rainbird-api
  template:
    metadata:
      labels:
        app: rainbird-api
    spec:
      containers:
        - name: api
          image: rainbird-api:latest # replace with your registry image
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: RAINBIRD_HOST
              value: "192.168.86.173"
            - name: RAINBIRD_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rainbird-credentials
                  key: RAINBIRD_PASSWORD
            - name: ZONE_NAMES_FILE
              value: /app/data/zone_names.json
            - name: CORS_ORIGINS
              value: "*"
          volumeMounts:
            - name: data
              mountPath: /app/data
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: rainbird-api-data
---
apiVersion: v1
kind: Service
metadata:
  name: rainbird-api
  namespace: rainbird
spec:
  selector:
    app: rainbird-api
  ports:
    - name: http
      port: 8000
      targetPort: http
