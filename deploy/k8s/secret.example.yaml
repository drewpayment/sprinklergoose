# Copy to secret.yaml (gitignored) and fill in real values, or create
# directly:
#   kubectl -n rainbird create secret generic rainbird-credentials \
#     --from-literal=RAINBIRD_PASSWORD='<password>'
#   kubectl -n rainbird create secret generic rainbird-web-next \
#     --from-literal=DATABASE_URL='postgres://user:pass@host:5432/sprinkler' \
#     --from-literal=BETTER_AUTH_SECRET="$(openssl rand -base64 32)" \
#     --from-literal=BETTER_AUTH_URL='https://sprinkler.example.home' \
#     --from-literal=TRUSTED_ORIGINS='https://sprinkler.example.home' \
#     --from-literal=EXECUTOR_URL='http://rainbird-api:8000'
apiVersion: v1
kind: Secret
metadata:
  name: rainbird-credentials
  namespace: rainbird
type: Opaque
stringData:
  RAINBIRD_PASSWORD: CHANGE_ME
---
# For rainbird-web-next (M1 Next.js app).
apiVersion: v1
kind: Secret
metadata:
  name: rainbird-web-next
  namespace: rainbird
type: Opaque
stringData:
  # Homelab Postgres, database `sprinkler`.
  DATABASE_URL: postgres://CHANGE_ME:CHANGE_ME@postgres.example:5432/sprinkler
  # openssl rand -base64 32
  BETTER_AUTH_SECRET: CHANGE_ME
  # The public URL users reach the app on (ingress/Tailscale hostname).
  BETTER_AUTH_URL: https://sprinkler.example.home
  # Comma-separated origins allowed to call Better Auth endpoints; any other
  # Origin gets 403 INVALID_ORIGIN. In production this MUST list the real
  # scheme://host[:port] users hit — i.e. the ingress hostname above. Add
  # every alias users reach the app on (extra hostnames, IP:port) if any.
  TRUSTED_ORIGINS: https://sprinkler.example.home
  # In-cluster executor Service — never exposed to browsers.
  EXECUTOR_URL: http://rainbird-api:8000
