name: Build and push images

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "apps/web-next/**"
      - ".github/workflows/docker.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: apps/api
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/sprinklergoose-api:latest
            ghcr.io/${{ github.repository_owner }}/sprinklergoose-api:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: apps/web-next
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/sprinklergoose-web:latest
            ghcr.io/${{ github.repository_owner }}/sprinklergoose-web:${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max
      - uses: docker/build-push-action@v6
        with:
          context: apps/web-next
          target: bootstrap
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/sprinklergoose-bootstrap:latest
            ghcr.io/${{ github.repository_owner }}/sprinklergoose-bootstrap:${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max
